<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico de Español: Nivel B1 (apúntate 1-4)</title>
    <style>
        :root {
            --primary: #e63946;
            --secondary: #457b9d;
            --bg: #f1faee;
            --text: #1d3557;
            --white: #ffffff;
            --error: #d62828;
            --success: #2a9d8f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); text-align: center; font-size: 1.5rem; }
        .setup-box { margin-bottom: 20px; text-align: center; }
        
        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid var(--secondary);
            border-radius: 8px;
            margin-top: 10px;
        }

        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            transition: width 0.3s;
        }

        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; }
        .options { display: grid; grid-template-columns: 1fr; gap: 10px; }
        
        button.option-btn {
            padding: 15px;
            font-size: 1rem;
            background: var(--bg);
            border: 2px solid var(--secondary);
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        button.option-btn:hover { background: #ddecfa; }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .back-btn {
            padding: 10px 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .back-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #result-area { display: none; }
        .category-score { margin: 15px 0; padding: 15px; border-radius: 8px; background: #f9f9f9; border: 1px solid #ddd; }
        .warning { color: var(--error); font-weight: bold; }
        .success { color: var(--success); font-weight: bold; }

        .recommendation-box {
            border-left: 5px solid var(--primary);
            padding: 10px;
            background: #fff5f5;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        details {
            margin-top: 10px;
            font-size: 0.9rem;
            background: #fff;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #eee;
        }

        summary { cursor: pointer; color: var(--secondary); font-weight: bold; }

        .error-item {
            border-bottom: 1px solid #eee;
            padding: 5px 0;
            margin-bottom: 5px;
        }

        .error-item:last-child { border-bottom: none; }

        .hidden { display: none; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Prueba de Diagnóstico: Español (Klasse 10)</h1>
    
    <div id="setup" class="setup-box">
        <p>Introduce tu nombre para empezar (Tiempo estimado: 30 min):</p>
        <input type="text" id="studentName" placeholder="Nombre Apellido...">
        <br><br>
        <button onclick="startQuiz()" style="padding: 15px 30px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Empezar el test</button>
    </div>

    <div id="quiz-ui" class="hidden">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="question-counter" style="font-size: 0.8rem; color: gray;"></div>
        <div id="question-text" class="question"></div>
        <div id="options-container" class="options"></div>
        
        <div class="nav-controls">
            <button id="back-btn" class="back-btn" onclick="prevQuestion()">← Atrás</button>
            <span></span> <!-- Spacer -->
        </div>
    </div>

    <div id="result-area">
        <h2>Resultados para <span id="display-name"></span></h2>
        <div id="score-summary"></div>
        <hr>
        <h3>Análisis cualitativo y recomendaciones:</h3>
        <div id="analysis-text"></div>
        <br>
        <button onclick="window.print()" class="no-print" style="padding: 10px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer;">Guardar como PDF / Imprimir</button>
    </div>
</div>

<script>
    const questions = [
        // Band 1-2 Basics
        { q: "Mis padres ___ de Madrid.", a: ["son", "están", "soy"], c: 0, cat: "Basics", ref: "B1-U1" },
        { q: "Ayer ___ mucho en el parque.", a: ["jugaba", "jugaste", "jugué"], c: 2, cat: "Vgz", ref: "B2-U4" },
        { q: "Todavía no ___ los deberes.", a: ["he hecho", "has hecho", "hice"], c: 0, cat: "Vgz", ref: "B2-M4/B4-U3" },
        { q: "¿Has visto a María? Sí, ___ vi ayer.", a: ["la", "lo", "le"], c: 0, cat: "Pron", ref: "B2-U3" },
        
        // Band 3 Fokus
        { q: "Cuando era pequeño, ___ al fútbol todos los días.", a: ["jugaba", "jugué", "he jugado"], c: 0, cat: "Vgz", ref: "B3-U1" },
        { q: "Espero que ___ (tú) pronto.", a: ["vienes", "vengas", "vengas"], c: 1, cat: "Subj", ref: "B3-U3" },
        { q: "Me dijo que ___ las maletas ya.", a: ["ha hecho", "había hecho", "hizo"], c: 1, cat: "Vgz", ref: "B4-U1" },
        { q: "He comprado un regalo para mi madre. ___ voy a dar ahora.", a: ["Se lo", "Me lo", "Le lo"], c: 0, cat: "Pron", ref: "B3-U2" },
        
        // Band 4 Fokus
        { q: "Si tengo tiempo, ___ al cine mañana.", a: ["iré", "vaya", "fui"], c: 0, cat: "FutCond", ref: "B4-M2" },
        { q: "En Perú ___ mucho ceviche.", a: ["se come", "come", "comen"], c: 0, cat: "Syn", ref: "B4-M1" },
        { q: "Este libro fue escrito ___ Cervantes.", a: ["para", "por", "de"], c: 1, cat: "Syn", ref: "B4-U2" },
        { q: "No creo que Juan ___ la verdad.", a: ["sabe", "sepa", "supiera"], c: 1, cat: "Subj", ref: "B3-U4" },
        { q: "Busco a alguien que ___ hablar japonés.", a: ["sabe", "sepa", "saben"], c: 1, cat: "Subj", ref: "B4-U4" },
        { q: "Me gustaría viajar a México, pero no ___ dinero.", a: ["tengo", "tendría", "tuviera"], c: 0, cat: "FutCond", ref: "B4-M3" },
        { q: "Es el chico ___ padre es médico.", a: ["que", "cuyo", "quien"], c: 1, cat: "Syn", ref: "B4-U1" },
        { q: "Esta es la casa en ___ vivo.", a: ["la que", "que", "el cual"], c: 0, cat: "Syn", ref: "B3-U4" },
        { q: "Mi hermano es un ___ amigo.", a: ["bueno", "buen", "bien"], c: 1, cat: "Basics", ref: "B2-U2" },
        { q: "Aun ___ cansado, siguió trabajando.", a: ["estar", "estando", "está"], c: 1, cat: "Syn", ref: "B4-U4" },
        { q: "Dámelo. -> ¡No ___ des!", a: ["lo me", "me lo", "melo"], c: 1, cat: "Pron", ref: "B3-M4/B4-U2" },
        { q: "Antes de ___ a dormir, leo un libro.", a: ["ir", "voy", "vaya"], c: 0, cat: "Basics", ref: "B2-U4/B4-U4" },
        
        // Vertiefung Band 4
        { q: "Mientras yo ___ la cena, él leía.", a: ["hice", "hacía", "he hecho"], c: 1, cat: "Vgz", ref: "B4-U1" },
        { q: "Estudiamos ___ aprender más.", a: ["por", "para", "a"], c: 1, cat: "Syn", ref: "B4-U2" },
        { q: "Es importante que ___ la naturaleza.", a: ["protegemos", "protejamos", "protejan"], c: 1, cat: "Subj", ref: "B3-U4" },
        { q: "¿Me prestas tu coche? El ___ está roto.", a: ["mío", "mi", "tuyo"], c: 0, cat: "Pron", ref: "B4-U2" },
        { q: "El año que viene ___ a España.", a: ["viajaré", "viajaría", "viajé"], c: 0, cat: "FutCond", ref: "B4-M2" },
        { q: "¡Ojalá ___ sol mañana!", a: ["hace", "haga", "hiciera"], c: 1, cat: "Subj", ref: "B3-U3" },
        { q: "No me gusta que la gente ___ en el tren.", a: ["grite", "grita", "gritar"], c: 0, cat: "Subj", ref: "B3-U3" },
        { q: "___ las tres cuando llegamos.", a: ["Eran", "Fueron", "Son"], c: 0, cat: "Vgz", ref: "B4-U1" },
        { q: "Dudo que ella ___ venir hoy.", a: ["puede", "pueda", "podrá"], c: 1, cat: "Subj", ref: "B3-U4" },
        { q: "Trabajó mucho, ___ no terminó el proyecto.", a: ["aunque", "cuando", "mientras"], c: 0, cat: "Syn", ref: "B4-U2" },
        { q: "He visto a un ___ hombre en la calle (a poor man).", a: ["pobre", "grande", "antiguo"], c: 0, cat: "Basics", ref: "B4-U3" },
        { q: "Al ___ de casa, me di cuenta de que no tenía las llaves.", a: ["salir", "saliendo", "salido"], c: 0, cat: "Basics", ref: "B4-U4" },
        { q: "No creo que ___ verdad lo que dices.", a: ["sea", "es", "fuera"], c: 0, cat: "Subj", ref: "B3-U4" },
        { q: "Cuando ___ (tú) a casa, llámame (Futur-Bezug).", a: ["llegas", "llegues", "llegaste"], c: 1, cat: "Subj", ref: "B4-U2" },
        { q: "Esta ciudad es muy ___.", a: ["grande", "gran", "grandes"], c: 0, cat: "Basics", ref: "B4-U3" },
        { q: "Me ___ que no vengas a la fiesta.", a: ["molesta", "molesto", "molestan"], c: 0, cat: "Subj", ref: "B3-U3" },
        { q: "Ese es el médico ___ me operó.", a: ["el cual", "cuyo", "lo que"], c: 0, cat: "Syn", ref: "B4-U1" },
        { q: "Te llamaré en cuanto ___ resultados.", a: ["tenga", "tengo", "tendré"], c: 0, cat: "Subj", ref: "B4-U2" },
        { q: "Llevo dos años ___ español.", a: ["estudiando", "estudiar", "estudiado"], c: 0, cat: "Syn", ref: "B3-U3" },
        { q: "¿A quién has llamado? ___ he llamado a él.", a: ["Lo", "Le", "La"], c: 1, cat: "Pron", ref: "B2-U1/B3-U2" }
    ];

    let currentQuestion = 0;
    let userAnswers = new Array(questions.length).fill(null);

    function startQuiz() {
        const name = document.getElementById('studentName').value;
        if (!name) return alert("Por favor, introduce tu nombre.");
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('quiz-ui').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('question-counter').innerText = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        q.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            if (userAnswers[currentQuestion] === index) {
                btn.style.borderColor = "var(--primary)";
                btn.style.background = "#ddecfa";
            }
            btn.innerText = opt;
            btn.onclick = () => selectOption(index);
            container.appendChild(btn);
        });

        document.getElementById('back-btn').disabled = currentQuestion === 0;
        const progress = (currentQuestion / questions.length) * 100;
        document.getElementById('progress-fill').style.width = progress + "%";
    }

    function selectOption(idx) {
        userAnswers[currentQuestion] = idx;
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            showQuestion();
        } else {
            showResults();
        }
    }

    function prevQuestion() {
        if (currentQuestion > 0) {
            currentQuestion--;
            showQuestion();
        }
    }

    function showResults() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('result-area').style.display = "block";
        document.getElementById('display-name').innerText = document.getElementById('studentName').value;
        
        let score = 0;
        let catStats = {};
        let catErrors = {};

        // Initialisiere Kategorien
        questions.forEach(q => {
            if (!catStats[q.cat]) {
                catStats[q.cat] = { correct: 0, total: 0 };
                catErrors[q.cat] = [];
            }
            catStats[q.cat].total++;
        });

        // Berechne Ergebnisse
        userAnswers.forEach((ans, i) => {
            const q = questions[i];
            if (ans === q.c) {
                score++;
                catStats[q.cat].correct++;
            } else {
                catErrors[q.cat].push({
                    question: q.q,
                    userAns: ans !== null ? q.a[ans] : "Sin respuesta",
                    correctAns: q.a[q.c]
                });
            }
        });

        const percent = Math.round((score / questions.length) * 100);
        document.getElementById('score-summary').innerHTML = `<h3>Puntuación total: ${score} / ${questions.length} (${percent}%)</h3>`;
        
        let analysis = "";
        for (let cat in catStats) {
            const stats = catStats[cat];
            const catPerc = Math.round((stats.correct / stats.total) * 100);
            let statusClass = catPerc < 60 ? "warning" : "success";
            
            analysis += `<div class="category-score">
                <strong>${getCatLabel(cat)}:</strong> <span class="${statusClass}">${catPerc}%</span> (${stats.correct}/${stats.total})`;
            
            if (catErrors[cat].length > 0) {
                analysis += `<details>
                    <summary>Ver errores (${catErrors[cat].length})</summary>
                    <div style="margin-top:10px">`;
                catErrors[cat].forEach(err => {
                    analysis += `<div class="error-item">
                        <strong>Pregunta:</strong> ${err.question}<br>
                        <span style="color:var(--error)">Tu respuesta: ${err.userAns}</span><br>
                        <span style="color:var(--success)">Correcta: ${err.correctAns}</span>
                    </div>`;
                });
                analysis += `</div></details>`;
            }

            if (catPerc < 70) {
                analysis += `<div class="recommendation-box">
                    💡 <em>Recomendación:</em> Repasa este tema en las unidades: <strong>${getRefForCat(cat)}</strong> de apúntate.
                </div>`;
            }
            analysis += `</div>`;
        }
        document.getElementById('analysis-text').innerHTML = analysis;
    }

    function getCatLabel(cat) {
        const labels = {
            "Basics": "Fundamentos (Ser/Estar, Adjetivos, Presente)",
            "Vgz": "Tiempos del pasado (Indefinido, Imperfecto, Pluscuamperfecto)",
            "Subj": "Modo Subjuntivo (Presente, Auslöser, Relativsätze)",
            "FutCond": "Futuro y Condicional",
            "Pron": "Pronombres (Objeto directo/indirecto, Posesivos)",
            "Syn": "Sintaxis (Por/Para, Pasiva, Gerundio, Relativos)"
        };
        return labels[cat] || cat;
    }

    function getRefForCat(cat) {
        const refs = {
            "Basics": "B1-U1, B1-U2, B2-U2, B4-U3",
            "Vgz": "B2-U4, B3-U1, B4-U1, B4-U3",
            "Subj": "B3-U3, B3-U4, B4-U2, B4-U4",
            "FutCond": "B4-M2, B4-M3",
            "Pron": "B2-U3, B3-U2, B4-U2",
            "Syn": "B4-M1, B4-U1, B4-U2, B4-U4"
        };
        return refs[cat] || "Consulta el libro";
    }
</script>

</body>
</html>
