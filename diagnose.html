<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico de Español: Nivel B1 (apúntate 1-4)</title>
    <style>
        :root {
            --primary: #e63946;
            --secondary: #457b9d;
            --bg: #f1faee;
            --text: #1d3557;
            --white: #ffffff;
            --error-bg: #fff0f0;
            --success-bg: #f0fff4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); text-align: center; font-size: 1.5rem; }
        .setup-box { margin-bottom: 20px; text-align: center; }
        
        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid var(--secondary);
            border-radius: 8px;
            margin-top: 10px;
        }

        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            transition: width 0.3s;
        }

        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; }
        .options { display: grid; grid-template-columns: 1fr; gap: 10px; }
        
        button.option-btn {
            padding: 15px;
            font-size: 1rem;
            background: var(--bg);
            border: 2px solid var(--secondary);
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        button.option-btn:hover { background: #ddecfa; }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn-nav {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #btn-back { background: #ccc; color: #333; }
        #btn-back:disabled { opacity: 0.3; cursor: not-allowed; }

        #result-area { display: none; }
        .category-score { margin: 20px 0; padding: 15px; border-radius: 8px; background: #f9f9f9; border: 1px solid #ddd; }
        
        .error-item { 
            margin-bottom: 20px; 
            padding: 15px; 
            border-radius: 6px; 
            background: var(--error-bg);
            border-left: 4px solid var(--primary);
        }

        .explanation-box {
            font-size: 0.95rem;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.7);
            border-radius: 4px;
            color: #333;
            line-height: 1.4;
        }

        .ref-tag {
            display: inline-block;
            margin-top: 5px;
            font-size: 0.8rem;
            color: var(--secondary);
            font-weight: bold;
        }

        .warning { color: #d62828; font-weight: bold; }
        .success { color: #2a9d8f; font-weight: bold; }

        .recommendation-box {
            border-left: 5px solid var(--primary);
            padding: 10px;
            background: #fff5f5;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        details { cursor: pointer; margin-top: 10px; }
        summary { font-weight: bold; color: var(--secondary); padding: 5px; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Prueba de Diagnóstico: Español (Nivel B1)</h1>
    
    <div id="setup" class="setup-box">
        <p>Gib deinen Namen ein, um zu beginnen (Dauer: ca. 30 Min.):</p>
        <input type="text" id="studentName" placeholder="Vorname...">
        <br><br>
        <button onclick="startQuiz()" style="padding: 15px 30px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Test starten</button>
    </div>

    <div id="quiz-ui" style="display:none">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="question-counter" style="font-size: 0.8rem; color: gray;"></div>
        <div id="question-text" class="question"></div>
        <div id="options-container" class="options"></div>
        <div class="nav-buttons">
            <button id="btn-back" class="btn-nav" onclick="goBack()">← Zurück (Atrás)</button>
            <span></span>
        </div>
    </div>

    <div id="result-area">
        <h2>Ergebnisse für <span id="display-name"></span></h2>
        <div id="score-summary"></div>
        <hr>
        <h3>Analyse deiner Fehler:</h3>
        <div id="analysis-text"></div>
        <br>
        <button onclick="window.print()" class="no-print" style="padding: 10px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer;">Als PDF speichern / Drucken</button>
    </div>
</div>

<script>
    const questions = [
        { 
            q: "1. Mis padres ___ de Madrid.", 
            a: ["son", "están", "soy"], 
            c: 0, cat: "Basics", ref: "B1-U1",
            expl: [
                "Richtig! 'Ser' wird für die Herkunft (procedencia) verwendet.",
                "Falsch: 'Estar' wird für Standorte oder vorübergehende Zustände genutzt, nicht für die Herkunft.",
                "Falsch: 'Soy' ist die 1. Person Singular (ich). 'Mis padres' erfordert die 3. Person Plural (sie)."
            ]
        },
        { 
            q: "2. Ayer ___ mucho en el parque.", 
            a: ["jugaba", "jugaste", "jugué"], 
            c: 2, cat: "Vgz", ref: "B2-U4",
            expl: [
                "Falsch: Das Imperfecto wird für Beschreibungen oder Gewohnheiten genutzt, nicht für abgeschlossene Handlungen ('ayer').",
                "Falsch: 'Jugaste' ist die 'tú'-Form. Da du von dir erzählst, brauchst du die 1. Person.",
                "Richtig! Das Indefinido drückt eine punktuelle, abgeschlossene Handlung in der Vergangenheit aus."
            ]
        },
        { 
            q: "3. Todavía no ___ los deberes.", 
            a: ["he hecho", "has hecho", "hice"], 
            c: 0, cat: "Vgz", ref: "B2-M4",
            expl: [
                "Richtig! 'Todavía no' signalisiert eine Verbindung zur Gegenwart, was das Perfekt erfordert.",
                "Falsch: 'Has hecho' ist die 2. Person (du). Der Satz bezieht sich meist auf die 1. Person (ich).",
                "Falsch: Das Indefinido ('hice') passt nicht gut zu 'todavía no', da dieses Signalwort eine zeitliche Nähe zur Gegenwart anzeigt."
            ]
        },
        { 
            q: "4. ¿Has visto a María? Sí, ___ vi ayer.", 
            a: ["la", "lo", "le"], 
            c: 0, cat: "Pron", ref: "B2-U3",
            expl: [
                "Richtig! 'La' ist das direkte Objektpronomen für weibliche Personen (María).",
                "Falsch: 'Lo' ist das maskuline direkte Objektpronomen.",
                "Falsch: 'Le' ist das indirekte Objektpronomen (Dativ). Hier wird ein direktes Objekt (Akkusativ) benötigt."
            ]
        },
        { 
            q: "5. Cuando era pequeño, ___ al fútbol todos los días.", 
            a: ["jugaba", "jugué", "he jugado"], 
            c: 0, cat: "Vgz", ref: "B3-U1",
            expl: [
                "Richtig! Das Imperfecto beschreibt regelmäßige Gewohnheiten in der Vergangenheit.",
                "Falsch: Das Indefinido würde eine einmalige, punktuelle Handlung beschreiben.",
                "Falsch: Das Perfekt passt nicht zu 'cuando era pequeño', da der Zeitraum abgeschlossen ist."
            ]
        },
        { 
            q: "6. Espero que ___ (tú) pronto.", 
            a: ["vienes", "vengas", "vengáis"], 
            c: 1, cat: "Subj", ref: "B3-U3",
            expl: [
                "Falsch: Nach Verben des Wunsches ('esperar que') muss der Subjuntivo stehen.",
                "Richtig! Das ist die korrekte Form des Presente de Subjuntivo für 'tú'.",
                "Falsch: 'Vengáis' ist die Form für 'vosotros', gesucht war aber 'tú'."
            ]
        },
        { 
            q: "7. Me dijo que ___ las maletas ya.", 
            a: ["ha hecho", "había hecho", "hice"], 
            c: 1, cat: "Vgz", ref: "B4-U1",
            expl: [
                "Falsch: Das Perfekt kann nicht in der indirekten Rede stehen, wenn das Einleitungsverb im Past steht.",
                "Richtig! Das Pluscuamperfecto drückt die Vorzeitigkeit zu einer Handlung im Past aus.",
                "Falsch: Das Indefinido drückt keine Vorzeitigkeit aus."
            ]
        },
        { 
            q: "8. He comprado un regalo para mi madre. ___ voy a dar ahora.", 
            a: ["Se lo", "Me lo", "Le lo"], 
            c: 0, cat: "Pron", ref: "B3-U2",
            expl: [
                "Richtig! 'Le' wird zu 'se', wenn es vor 'lo/la' steht (Vermeidung von 'le lo').",
                "Falsch: 'Me lo' würde bedeuten, dass du dir das Geschenk selbst gibst.",
                "Falsch: 'Le lo' ist im Spanischen unmöglich; das indirekte Pronomen muss zu 'se' werden."
            ]
        },
        { 
            q: "9. Si tengo tiempo, ___ al cine mañana.", 
            a: ["iré", "vaya", "fui"], 
            c: 0, cat: "FutCond", ref: "B4-M2",
            expl: [
                "Richtig! Bei realen Bedingungssätzen (si + presente) folgt im Hauptsatz das Futuro.",
                "Falsch: Der Subjuntivo steht niemals im Hauptsatz eines Bedingungssatzes mit 'si'.",
                "Falsch: 'Fui' ist Vergangenheit, der Satz bezieht sich aber auf 'mañana'."
            ]
        },
        { 
            q: "10. En Perú ___ mucho ceviche.", 
            a: ["se come", "come", "comen"], 
            c: 0, cat: "Syn", ref: "B4-M1",
            expl: [
                "Richtig! Das 'pasiva refleja' (se + 3. Person) wird für allgemeine Aussagen genutzt.",
                "Falsch: 'Come' bräuchte ein konkretes Subjekt (Er/Sie).",
                "Falsch: 'Comen' würde sich auf konkrete Personen ('sie') beziehen, 'se come' ist die neutralere Form."
            ]
        },
        { 
            q: "11. Este libro fue escrito ___ Cervantes.", 
            a: ["para", "por", "de"], 
            c: 1, cat: "Syn", ref: "B4-U2",
            expl: [
                "Falsch: 'Para' gibt den Zweck oder Empfänger an, nicht den Urheber.",
                "Richtig! 'Por' leitet im Passiv den Urheber (Agente) ein.",
                "Falsch: 'De' zeigt Besitz an, markiert aber nicht den Handelnden im Passiv."
            ]
        },
        { 
            q: "12. No creo que Juan ___ la verdad.", 
            a: ["sabe", "sepa", "supiera"], 
            c: 1, cat: "Subj", ref: "B3-U4",
            expl: [
                "Falsch: Nach verneinten Verben des Glaubens ('no creo que') ist der Subjuntivo zwingend.",
                "Richtig! Presente de Subjuntivo nach 'no creo que'.",
                "Falsch: Der Imperfecto de Subjuntivo ('supiera') würde ein Einleitungsverb in der Vergangenheit erfordern."
            ]
        },
        { 
            q: "13. Busco a alguien que ___ hablar japonés.", 
            a: ["sabe", "sepa", "saben"], 
            c: 1, cat: "Subj", ref: "B4-U4",
            expl: [
                "Falsch: Du suchst eine beliebige (unbekannte) Person, daher ist der Indikativ falsch.",
                "Richtig! Der Subjuntivo wird in Relativsätzen verwendet, wenn die Person/Sache noch nicht existiert oder unbekannt ist.",
                "Falsch: 'Saben' ist Plural, gesucht ist aber jemand (Singular)."
            ]
        },
        { 
            q: "14. Me gustaría viajar a México, pero no ___ dinero.", 
            a: ["tengo", "tendría", "tuviera"], 
            c: 0, cat: "FutCond", ref: "B4-M3",
            expl: [
                "Richtig! Nach 'pero' beschreibst du die reale Gegenwart mit dem Indikativ.",
                "Falsch: Das Konditional wird hier nicht verwendet, um einen Grund anzugeben.",
                "Falsch: Der Subjuntivo würde nach 'si' (wenn) stehen, nicht nach 'pero'."
            ]
        },
        { 
            q: "15. Es el chico ___ padre es médico.", 
            a: ["que", "cuyo", "quien"], 
            c: 1, cat: "Syn", ref: "B4-U1",
            expl: [
                "Falsch: 'Que' drückt keinen Besitz aus.",
                "Richtig! 'Cuyo' ist das Relativpronomen für Besitz ('dessen').",
                "Falsch: 'Quien' bezieht sich auf Personen, zeigt aber kein Besitzverhältnis an."
            ]
        },
        { 
            q: "16. Esta es la casa en ___ vivo.", 
            a: ["la que", "que", "el cual"], 
            c: 0, cat: "Syn", ref: "B3-U4",
            expl: [
                "Richtig! Nach einer Präposition ('en') braucht das Relativpronomen den Artikel.",
                "Falsch: Nur 'que' nach 'en' ist seltener und weniger präzise als 'la que' bei Gebäuden.",
                "Falsch: 'Casa' ist weiblich, 'el cual' ist männlich."
            ]
        },
        { 
            q: "17. Mi hermano es un ___ amigo.", 
            a: ["bueno", "buen", "bien"], 
            c: 1, cat: "Basics", ref: "B2-U2",
            expl: [
                "Falsch: 'Bueno' wird vor männlichen Substantiven im Singular gekürzt.",
                "Richtig! Die Kurzform (Apócope) von 'bueno' vor einem männlichen Nomen.",
                "Falsch: 'Bien' ist ein Adverb, kein Adjektiv."
            ]
        },
        { 
            q: "18. Aun ___ cansado, siguió trabajando.", 
            a: ["estar", "estando", "está"], 
            c: 1, cat: "Syn", ref: "B4-U4",
            expl: [
                "Falsch: Der Infinitiv passt hier nicht zur Konstruktion mit 'aun'.",
                "Richtig! Gerundio mit 'aun' bedeutet 'obwohl' / 'selbst wenn'.",
                "Falsch: Eine konjugierte Form kann hier nicht ohne Konjunktion stehen."
            ]
        },
        { 
            q: "19. Dámelo. -> ¡No ___ des!", 
            a: ["lo me", "me lo", "melo"], 
            c: 1, cat: "Pron", ref: "B4-U2",
            expl: [
                "Falsch: Die Reihenfolge ist immer Reflexiv/Indirekt vor Direkt.",
                "Richtig! Beim verneinten Imperativ stehen die Pronomen getrennt vor dem Verb (OI + OD).",
                "Falsch: Pronomen werden beim verneinten Imperativ niemals an das Verb angehängt."
            ]
        },
        { 
            q: "20. Antes de ___ a dormir, leo un libro.", 
            a: ["ir", "voy", "vaya"], 
            c: 0, cat: "Basics", ref: "B2-U4",
            expl: [
                "Richtig! Nach 'antes de' steht der Infinitiv, wenn das Subjekt gleich bleibt.",
                "Falsch: Ein konjugiertes Verb (Indicativo) kann nicht direkt nach 'de' stehen.",
                "Falsch: Der Subjuntivo bräuchte 'antes de que' und ein anderes Subjekt."
            ]
        },
        { 
            q: "21. Mientras yo ___ la cena, él leía.", 
            a: ["hice", "hacía", "he hecho"], 
            c: 1, cat: "Vgz", ref: "B4-U1",
            expl: [
                "Falsch: Das Indefinido würde die Handlung als Punkt markieren, nicht als Verlauf.",
                "Richtig! Zwei gleichzeitige Handlungen im Hintergrund werden im Imperfecto ausgedrückt.",
                "Falsch: Das Perfekt passt nicht zum Erzählkontext der Vergangenheit."
            ]
        },
        { 
            q: "22. Estudiamos ___ aprender más.", 
            a: ["por", "para", "a"], 
            c: 1, cat: "Syn", ref: "B4-U2",
            expl: [
                "Falsch: 'Por' gibt meist den Grund oder die Ursache an, nicht die Absicht.",
                "Richtig! 'Para' drückt das Ziel oder die Absicht (Finalität) aus.",
                "Falsch: 'A' drückt keine Absicht in Verbindung mit Lernen aus."
            ]
        },
        { 
            q: "23. Es importante que ___ la naturaleza.", 
            a: ["protegemos", "protejamos", "protejan"], 
            c: 1, cat: "Subj", ref: "B3-U4",
            expl: [
                "Falsch: Nach unpersönlichen Ausdrücken der Bewertung ('es importante que') folgt der Subjuntivo.",
                "Richtig! Presente de Subjuntivo (nosotros).",
                "Falsch: 'Protejan' ist die Form für 'sie', der Kontext impliziert eher 'wir'."
            ]
        },
        { 
            q: "24. ¿Me prestas tu coche? El ___ está roto.", 
            a: ["mío", "mi", "tuyo"], 
            c: 0, cat: "Pron", ref: "B4-U2",
            expl: [
                "Richtig! Das Possessivpronomen ersetzt das Nomen 'coche'.",
                "Falsch: 'Mi' ist ein Begleiter und braucht ein Nomen (mi coche).",
                "Falsch: 'Tuyo' bezieht sich auf das Auto des anderen, aber du sprichst von deinem."
            ]
        },
        { 
            q: "25. El año que viene ___ a España.", 
            a: ["viajaré", "viajaría", "viajé"], 
            c: 0, cat: "FutCond", ref: "B4-M2",
            expl: [
                "Richtig! 'El año que viene' verlangt das Futuro Simple.",
                "Falsch: Konditional wird für Hypothesen genutzt, nicht für feste Pläne.",
                "Falsch: 'Viajé' ist Vergangenheit."
            ]
        },
        { 
            q: "26. ¡Ojalá ___ sol mañana!", 
            a: ["hace", "haga", "hiciera"], 
            c: 1, cat: "Subj", ref: "B3-U3",
            expl: [
                "Falsch: Nach 'Ojalá' darf niemals der Indikativ stehen.",
                "Richtig! Ein erfüllbarer Wunsch für die Zukunft verlangt das Presente de Subjuntivo.",
                "Falsch: 'Hiciera' (Imperfecto de Subjuntivo) würde einen fast unmöglichen Wunsch ausdrücken."
            ]
        },
        { 
            q: "27. No me gusta que la gente ___ en el tren.", 
            a: ["grite", "grita", "gritar"], 
            c: 0, cat: "Subj", ref: "B3-U3",
            expl: [
                "Richtig! Verben des Gefühls ('me gusta') mit Subjektwechsel verlangen den Subjuntivo.",
                "Falsch: Indikativ ist nach Gefühlsäußerungen bei Subjektwechsel nicht möglich.",
                "Falsch: Der Infinitiv ginge nur, wenn es kein zweites Subjekt ('la gente') gäbe."
            ]
        },
        { 
            q: "28. ___ las tres cuando llegamos.", 
            a: ["Eran", "Fueron", "Son"], 
            c: 0, cat: "Vgz", ref: "B4-U1",
            expl: [
                "Richtig! Uhrzeiten im Past werden immer mit dem Imperfecto eingeleitet.",
                "Falsch: Das Indefinido wird nicht für die Uhrzeit als Hintergrundinfo genutzt.",
                "Falsch: 'Son' ist Präsens, der Satz steht aber im Past."
            ]
        },
        { 
            q: "29. Dudo que ella ___ venir hoy.", 
            a: ["puede", "pueda", "podrá"], 
            c: 1, cat: "Subj", ref: "B3-U4",
            expl: [
                "Falsch: Verben des Zweifels ('dudar') verlangen den Subjuntivo.",
                "Richtig! Presente de Subjuntivo.",
                "Falsch: Das Futuro ist nach 'dudar que' nicht korrekt."
            ]
        },
        { 
            q: "30. Trabajó mucho, ___ no terminó el proyecto.", 
            a: ["aunque", "cuando", "mientras"], 
            c: 0, cat: "Syn", ref: "B4-U2",
            expl: [
                "Richtig! 'Aunque' (obwohl) leitet den Gegensatz ein.",
                "Falsch: 'Cuando' ist rein zeitlich und passt hier nicht zum Gegensatz.",
                "Falsch: 'Mientras' drückt Gleichzeitigkeit aus, keinen Kontrast."
            ]
        },
        { 
            q: "31. He visto a un ___ hombre en la calle (a poor man).", 
            a: ["pobre", "grande", "antiguo"], 
            c: 0, cat: "Basics", ref: "B4-U3",
            expl: [
                "Richtig! Vor dem Nomen bedeutet 'pobre' bedauernswert oder mittellos.",
                "Falsch: 'Grande' wird vor Nomen zu 'gran'.",
                "Falsch: 'Antiguo' bezieht sich meist auf Sachen (ehemalig/alt), nicht auf den Zustand eines Mannes."
            ]
        },
        { 
            q: "32. Al ___ de casa, me di cuenta de que no tenía las llaves.", 
            a: ["salir", "saliendo", "salido"], 
            c: 0, cat: "Basics", ref: "B4-U4",
            expl: [
                "Richtig! 'Al + Infinitiv' bedeutet 'beim ...' / 'als ich ...'.",
                "Falsch: Das Gerundio kann nicht nach 'al' stehen.",
                "Falsch: Das Partizip passt nicht in diese zeitliche Struktur."
            ]
        },
        { 
            q: "33. No creo que ___ verdad lo que dices.", 
            a: ["sea", "es", "fuera"], 
            c: 0, cat: "Subj", ref: "B3-U4",
            expl: [
                "Richtig! Verneinte Meinung verlangt den Subjuntivo.",
                "Falsch: Der Indikativ 'es' ist bei 'No creo que' falsch.",
                "Falsch: 'Fuera' wäre Vergangenheit, wir sprechen aber über das Jetzt."
            ]
        },
        { 
            q: "34. Cuando ___ (tú) a casa, llámame (Futur-Bezug).", 
            a: ["llegas", "llegues", "llegaste"], 
            c: 1, cat: "Subj", ref: "B4-U2",
            expl: [
                "Falsch: 'Cuando' mit Zukunftsbezug darf niemals im Indikativ stehen.",
                "Richtig! Temporalsätze mit Zukunftsbedeutung verlangen den Subjuntivo.",
                "Falsch: Das Indefinido bezieht sich auf die Vergangenheit."
            ]
        },
        { 
            q: "35. Esta ciudad es muy ___.", 
            a: ["grande", "gran", "grandes"], 
            c: 0, cat: "Basics", ref: "B4-U3",
            expl: [
                "Richtig! Nach dem Nomen wird 'grande' nicht gekürzt.",
                "Falsch: 'Gran' steht nur direkt vor dem Nomen.",
                "Falsch: 'Ciudad' ist Singular, 'grandes' ist Plural."
            ]
        },
        { 
            q: "36. Me ___ que no vengas a la fiesta.", 
            a: ["molesta", "molesto", "molestan"], 
            c: 0, cat: "Subj", ref: "B3-U3",
            expl: [
                "Richtig! Der ganze Nebensatz ('que no vengas') ist das Subjekt (Einzahl).",
                "Falsch: 'Molesto' ist die 'ich'-Form (ich störe).",
                "Falsch: Der Nebensatz als Subjekt verlangt die Einzahl des Verbs."
            ]
        },
        { 
            q: "37. Ese es el médico ___ me operó.", 
            a: ["el cual", "cuyo", "lo que"], 
            c: 0, cat: "Syn", ref: "B4-U1",
            expl: [
                "Richtig! Relativpronomen mit Artikel zur näheren Bestimmung einer Person.",
                "Falsch: 'Cuyo' (dessen) bräuchte ein nachfolgendes Nomen.",
                "Falsch: 'Lo que' bezieht sich auf abstrakte Sachverhalte, nicht auf Personen."
            ]
        },
        { 
            q: "38. Te llamaré en cuanto ___ resultados.", 
            a: ["tenga", "tengo", "tendré"], 
            c: 0, cat: "Subj", ref: "B4-U2",
            expl: [
                "Richtig! 'En cuanto' (sobald) verlangt bei Zukunftsbezug den Subjuntivo.",
                "Falsch: Indikativ Präsens ist hier bei Zukunftsbezug nicht korrekt.",
                "Falsch: Das Futuro darf im Spanischen nicht nach zeitlichen Konjunktionen stehen."
            ]
        },
        { 
            q: "39. Llevo dos años ___ español.", 
            a: ["estudiando", "estudiar", "estudiado"], 
            c: 0, cat: "Syn", ref: "B3-U3",
            expl: [
                "Richtig! 'Llevar + Zeit + Gerundio' drückt die Zeitdauer einer Handlung aus.",
                "Falsch: Mit dieser Periphrase kann kein Infinitiv genutzt werden.",
                "Falsch: Das Partizip passt nicht in die Verlaufsform von 'llevar'."
            ]
        },
        { 
            q: "40. ¿A quién has llamado? ___ he llamado a él.", 
            a: ["Lo", "Le", "La"], 
            c: 1, cat: "Pron", ref: "B3-U2",
            expl: [
                "Falsch: 'Lo' wäre das direkte Objekt, aber bei Personen im Maskulinum wird oft 'le' verwendet.",
                "Richtig! 'Le' als Ersatz für eine männliche Person (Leísmo), besonders im Dativ-Kontext klarer.",
                "Falsch: 'La' ist weiblich, der Satz endet aber auf 'a él'."
            ]
        }
    ];

    let currentQuestion = 0;
    let userAnswers = [];

    function startQuiz() {
        const name = document.getElementById('studentName').value;
        if (!name) return alert("Bitte gib deinen Namen ein.");
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('question-counter').innerText = `Frage ${currentQuestion + 1} von ${questions.length}`;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        q.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = opt;
            if (userAnswers[currentQuestion] === index) {
                btn.style.background = "#ddecfa";
                btn.style.border = "2px solid var(--secondary)";
            }
            btn.onclick = () => selectOption(index);
            container.appendChild(btn);
        });

        const progress = ((currentQuestion) / questions.length) * 100;
        document.getElementById('progress-fill').style.width = progress + "%";
        document.getElementById('btn-back').disabled = currentQuestion === 0;
    }

    function selectOption(idx) {
        userAnswers[currentQuestion] = idx;
        currentQuestion++;
        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function goBack() {
        if (currentQuestion > 0) {
            currentQuestion--;
            showQuestion();
        }
    }

    function showResults() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-area').style.display = "block";
        document.getElementById('display-name').innerText = document.getElementById('studentName').value;
        
        let score = 0;
        let catStats = {};
        let catErrors = {};

        questions.forEach(q => {
            if (!catStats[q.cat]) {
                catStats[q.cat] = { correct: 0, total: 0 };
                catErrors[q.cat] = [];
            }
            catStats[q.cat].total++;
        });

        userAnswers.forEach((ans, idx) => {
            const q = questions[idx];
            if (ans === q.c) {
                score++;
                catStats[q.cat].correct++;
            } else {
                catErrors[q.cat].push({
                    question: q.q,
                    userAns: q.a[ans] || "Keine Antwort",
                    correctAns: q.a[q.c],
                    explanation: q.expl[ans] || "Keine Erklärung verfügbar.",
                    correctExpl: q.expl[q.c],
                    ref: q.ref
                });
            }
        });

        const percent = Math.round((score / questions.length) * 100);
        document.getElementById('score-summary').innerHTML = `<h3>Gesamtpunktzahl: ${score} / ${questions.length} (${percent}%)</h3>`;
        
        let analysis = "";
        for (let cat in catStats) {
            const stats = catStats[cat];
            const catPerc = Math.round((stats.correct / stats.total) * 100);
            let statusClass = catPerc < 60 ? "warning" : "success";
            
            analysis += `<div class="category-score">
                <strong>${getCatLabel(cat)}:</strong> <span class="${statusClass}">${catPerc}%</span> (${stats.correct}/${stats.total})`;
            
            if (catErrors[cat].length > 0) {
                analysis += `<details>
                    <summary>Fehlertypen anzeigen (${catErrors[cat].length})</summary>
                    <div style="margin-top:10px">`;
                catErrors[cat].forEach(err => {
                    analysis += `<div class="error-item">
                        <strong>Frage:</strong> ${err.question}<br>
                        <span style="color:var(--primary)">✖ Deine Antwort: ${err.userAns}</span>
                        <div class="explanation-box">
                            <strong>Feedback:</strong> ${err.explanation}<br><br>
                            <strong>Richtige Lösung:</strong> ${err.correctAns}<br>
                            <em>Hintergrund:</em> ${err.correctExpl}
                        </div>
                        <span class="ref-tag">Buch-Verweis: ${err.ref}</span>
                    </div>`;
                });
                analysis += `</div></details>`;
            }

            if (catPerc < 70) {
                analysis += `<div class="recommendation-box">
                    💡 <em>Lern-Empfehlung:</em> Wiederhole dieses Thema in <strong>apúntate</strong>: ${getRefForCat(cat)}.
                </div>`;
            }
            analysis += `</div>`;
        }
        document.getElementById('analysis-text').innerHTML = analysis;
    }

    function getCatLabel(cat) {
        const labels = {
            "Basics": "Grundlagen (Ser/Estar, Adjektive, Präsens)",
            "Vgz": "Vergangenheitsformen (Indefinido, Imperfecto, Pluscuamperfecto)",
            "Subj": "Modus Subjuntivo",
            "FutCond": "Futur & Konditional",
            "Pron": "Pronomen (Objektpronomen, Possessivpronomen)",
            "Syn": "Syntax & Konnektoren (Por/Para, Passiv, Relativsätze)"
        };
        return labels[cat] || cat;
    }

    function getRefForCat(cat) {
        const refs = {
            "Basics": "B1-U1, B1-U2, B2-U2, B4-U3",
            "Vgz": "B2-U4, B3-U1, B4-U1, B4-U3",
            "Subj": "B3-U3, B3-U4, B4-U2, B4-U4",
            "FutCond": "B4-M2, B4-M3",
            "Pron": "B2-U3, B3-U2, B4-U2",
            "Syn": "B4-M1, B4-U1, B4-U2, B4-U4"
        };
        return refs[cat] || "Siehe Kursübersicht";
    }
</script>
